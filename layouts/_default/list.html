{{ define "main" }}
<div class="page-content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ if not .IsHome }}
      {{ range .Pages }}
      <article class="card" style="margin-top:16px;">
          <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
          <p>{{ .Description }}</p>
      </article>
      {{ end }}
    {{ end }}
</div>
{{ end }}

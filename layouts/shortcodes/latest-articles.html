<!-- Render 3 latest blog posts sorted by date descending -->
<div class="latest-articles-section">
  <h2>Latest Articles</h2>
  
  <div class="articles-grid">
    {{ $articles := where site.RegularPages "Section" "blog" }}
    {{ $sorted := sort $articles "Date" "desc" }}
    {{ range first 3 $sorted }}
    <div class="article-card">
      <a href="{{ .Permalink }}" class="article-link">
        <h3 class="article-title">{{ .Title }}</h3>
        <div class="article-meta">
          <span class="article-date">{{ .Date.Format "2006-01-02" }}</span>
          <span class="article-category">Technical Guide</span>
        </div>
        {{ with .Summary }}
        <p class="article-summary">{{ . }}</p>
        {{ end }}
      </a>
    </div>
    {{ end }}
  </div>
  
  <div class="view-all-link">
    <a href="/blog/">View all articles →</a>
  </div>
</div>
